spring:
  application:
    name: semilio

  datasource:
    url: jdbc:postgresql://localhost:5432/semiliodb
    username: postgres
    password: root
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 30000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        generate_statistics: true
    defer-datasource-initialization: true

  sql:
    init:
      mode: always
      data-locations:
        - classpath:db/init/brands.sql
        - classpath:db/init/colors.sql
        - classpath:db/init/sizes.sql

  cache:
    type: caffeine

  mail:
    host: smtp.gmail.com
    port: 465
    username: similio.com@gmail.com
    password: 
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB

app:
  security:
    jwt:
      access-token-expiration: 900000
      refresh-token-expiration: 604800000
  cors:
    allowed-origins:
      - http://localhost:4200
      - https://www.semilio.pl
      - https://semilio.pl
  frontendUrl: https://www.semilio.pl

cloud:
  aws:
    credentials:
      access-key:
      secret-key:
    region: eu-north-1

aws:
  bucket:
    name: semilio-app-storage


twilio:
  account-sid:
  auth-token:
  phone-number: +14177427057


server:
#  address: 0.0.0.0
  port: 8080
  forward-headers-strategy: native

logging:
  level:
#    org.hibernate.SQL: DEBUG
#    org.hibernate.orm.queries: DEBUG
    org:
      springframework:
        web: DEBUG
        security: DEBUG
#        messaging: DEBUG
#        web.socket: DEBUG