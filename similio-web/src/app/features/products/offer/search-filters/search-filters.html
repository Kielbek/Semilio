<div class="w-full bg-white md:border-b md:border-gray-100 md:shadow-sm">

  <div class="md:hidden flex items-center p-4 gap-2 overflow-x-auto no-scrollbar">
    <button type="button" (click)="toggleMobile()"
            class="flex items-center gap-2 px-4 py-2 border border-gray-300 rounded-full
            font-bold text-sm text-[#002f34] bg-white cursor-pointer">
      <lucide-icon name="filter" class="w-4 h-4"></lucide-icon>
      Filtry
    </button>
    <div class="h-6 w-[1px] bg-gray-200 mx-1"></div>
    <span class="text-xs text-gray-500 whitespace-nowrap">Wybrano filtrów: {{ filterForm.dirty ? 'Tak' : '0' }}</span>
  </div>

  <div class="bg-white z-[2000] transition-transform duration-200
              md:static md:!flex md:items-end md:gap-4 md:px-8 md:py-4 w-full md:max-w-7xl md:mx-auto"
       [ngClass]="isMobileOpen() ? 'fixed inset-0 flex flex-col' : 'hidden'">

    <div class="md:hidden flex items-center p-4 border-b border-gray-100 bg-white sticky top-0 shrink-0 z-10">
      <button type="button" (click)="toggleMobile()" class="p-1">
        <lucide-icon name="arrow-left" class="w-6 h-6"></lucide-icon>
      </button>
      <h2 class="flex-1 text-center font-bold text-[#002f34]">Filtry</h2>
      <button type="button" (click)="clear()" class="text-sm font-medium text-gray-400">Wyczyść</button>
    </div>

    <form [formGroup]="filterForm" class="flex-1 overflow-y-auto md:overflow-visible p-6 md:p-0 flex flex-col
    md:flex-row md:flex-wrap md:items-end gap-6 md:gap-4 w-full">

      <h3 class="md:hidden text-xs font-bold uppercase tracking-widest text-[#002f34] mt-2 mb-[-12px]">Kolejność</h3>
      <div class="w-full md:flex-1 min-w-[180px]">
        <app-select
          label="Sortowanie"
          formControlName="sort"
          [control]="filterForm.controls.sort"
          [options]="sortOptions">
        </app-select>
      </div>

      <h3 class="md:hidden text-xs font-bold uppercase tracking-widest text-[#002f34] mb-[-12px]">Cena</h3>
      <div class="flex gap-4 md:gap-2 w-full md:flex-[1.5] min-w-[200px]">
        <div class="flex-1">
          <app-input-field
            label="Cena od"
            [control]="filterForm.controls.priceFrom"
            type="number"
            suffix="PLN">
          </app-input-field>
        </div>
        <div class="flex-1">
          <app-input-field
            label="Cena do"
            [control]="filterForm.controls.priceTo"
            type="number"
            suffix="PLN">
          </app-input-field>
        </div>
      </div>

      <h3 class="md:hidden text-xs font-bold uppercase tracking-widest text-[#002f34] mb-[-12px]">Szczegóły</h3>
      <div class="w-full md:flex-1 min-w-[140px]">
        <app-select
          label="Stan"
          formControlName="condition"
          [control]="filterForm.controls.condition"
          [options]="conditions">
        </app-select>
      </div>

      <div class="w-full md:flex-1 min-w-[140px]">
        <app-select
          label="Rozmiar"
          formControlName="size"
          [control]="filterForm.controls.size"
          [options]="(sizes$ | async) || []">
        </app-select>
      </div>

      <div class="w-full md:flex-1 min-w-[140px]">
        <app-select
          label="Kolor"
          formControlName="color"
          [control]="filterForm.controls.color"
          [options]="(colors$ | async) || []">
        </app-select>
      </div>

      <div class="w-full md:flex-1 min-w-[140px]">
        <app-select
          label="Marka"
          formControlName="brand"
          [control]="filterForm.controls.brand"
          [options]="(brands$ | async) || []">
        </app-select>
      </div>

    </form>
    <div class="md:hidden p-4 border-t border-gray-100 bg-white shrink-0 mt-auto w-full">
      <app-button [fullWidth]="true" (click)="apply()">
        Zastosuj filtry
      </app-button>
    </div>
  </div>
</div>
