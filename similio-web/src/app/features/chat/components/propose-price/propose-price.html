<app-ui-modal [title]="'Zaproponuj cenę'" (close)="close.emit()">

  <div class="px-4 py-3 bg-gray-50/80 border-b border-gray-100 flex items-center gap-3 shrink-0">
    <div class="w-12 h-12 shrink-0 rounded-md overflow-hidden border border-gray-200 bg-white">
      <img
        [src]="productImage || 'assets/placeholder.png'"
        class="w-full h-full object-cover"
      />
    </div>
    <div class="flex flex-col min-w-0">
      <h4 class="text-sm font-medium text-[#002f34] truncate">{{ productTitle || 'Produkt' }}</h4>
      <p class="text-sm font-bold text-[#002f34]">
        {{ currentPrice | number:'1.2-2' }} PLN
      </p>
    </div>
  </div>

  <div class="p-5 space-y-6">

    <div>
      <app-input-field
        label="Twoja propozycja"
        type="number"
        suffix="PLN"
        [placeholder]="currentPrice.toString()"
        [control]="priceControl">
      </app-input-field>
    </div>

    <div>
      <p class="text-[10px] text-gray-400 uppercase tracking-wider mb-2 font-bold">Szybki wybór</p>
      <div class="flex gap-2 overflow-x-auto pb-1 scrollbar-hide">
        <button (click)="setPrice(suggestedPrice())"
                class="flex-shrink-0 px-3 py-2 rounded-lg border border-gray-200 text-xs font-medium text-[#002f34] hover:bg-gray-50 active:bg-[#002f34] active:text-white transition-colors">
          {{ suggestedPrice() }} zł <span class="text-gray-400 text-[10px] ml-1">-10%</span>
        </button>
        <button (click)="setPrice(Math.round(currentPrice * 0.8))"
                class="flex-shrink-0 px-3 py-2 rounded-lg border border-gray-200 text-xs font-medium text-[#002f34] hover:bg-gray-50 active:bg-[#002f34] active:text-white transition-colors">
          {{ Math.round(currentPrice * 0.8) }} zł <span class="text-gray-400 text-[10px] ml-1">-20%</span>
        </button>
        <button (click)="setPrice(Math.round(currentPrice * 0.7))"
                class="flex-shrink-0 px-3 py-2 rounded-lg border border-gray-200 text-xs font-medium text-[#002f34] hover:bg-gray-50 active:bg-[#002f34] active:text-white transition-colors">
          {{ Math.round(currentPrice * 0.7) }} zł <span class="text-gray-400 text-[10px] ml-1">-30%</span>
        </button>
      </div>
    </div>

    <div class="flex gap-3 p-3 bg-blue-50/50 rounded-lg text-[#002f34] border border-blue-100">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-info-icon lucide-info shrink-0 text-blue-600"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
      <p class="text-xs text-blue-800 leading-relaxed">
        Sprzedający może zaakceptować lub odrzucić ofertę. To nie jest wiążący zakup.
      </p>
    </div>
  </div>

  <div class="mt-auto p-4 border-t border-gray-100 bg-white">
    <app-button
      (click)="onSend()"
      [fullWidth]="true"
      [disabled]="!isPriceValid"
    >
      Wyślij propozycję
    </app-button>
  </div>

</app-ui-modal>
