<app-chat-header
  [chat]="chatInfo$ | async"
  (back)="goBackToList()"
  (openProposal)="openPriceProposal()"
>
</app-chat-header>

@if (showPriceModal() && ($any(chatInfo$ | async)?.productPrice?.amount)) {
  <app-propose-price
    [productImage]="($any(chatInfo$ | async)).productImage.url"
    [productTitle]="($any(chatInfo$ | async)).productTitle"
    [currentPrice]="($any(chatInfo$ | async)).productPrice?.amount || 0"
    (close)="showPriceModal.set(false)"
    [chatId]="($any(chatInfo$ | async)).id"
  >
  </app-propose-price>
}

<section
  #scrollContainer
  (scroll)="onScroll($event)"
  class="flex-1 overflow-y-auto p-4 space-y-4 bg-gray-50/30"
>
  <div class="flex flex-col min-h-full justify-end">
    @for (msg of (messages$ | async) ?? []; track msg.id) {
      <app-chat-messages [message]="msg" [currentUserId]="currentUserId"></app-chat-messages>
    }
  </div>
</section>

@if ($any(chatInfo$ | async)?.productStatus === 'DELETED') {
  <div class="px-4 py-3 border-t border-gray-200 text-center">
    <p class="text-sm text-gray-500 font-medium">
      Ten przedmiot nie jest już dostępny
    </p>
  </div>
}

<div class="p-3 md:p-4 border-t border-gray-100 bg-white shrink-0">
  <app-chat-input (send)="onSendMessage($event)"></app-chat-input>
</div>
