<div class="border-b border-slate-200">
  <button
    type="button"
    (click)="toggle()"
    class="w-full flex items-center justify-between py-4 px-2 text-left bg-transparent hover:bg-slate-50 transition-colors duration-200 group focus:outline-none"
  >
    <span
      class="text-[15px] font-medium transition-colors duration-200"
      [ngClass]="isOpen ? 'text-[#002f34]' : 'text-slate-700 group-hover:text-[#002f34]'"
    >
      {{ title }}
    </span>

    <svg
      xmlns="http://www.w3.org/2000/svg"
      class="h-5 w-5 transform transition-transform duration-300 ease-in-out"
      [ngClass]="isOpen ? 'rotate-180 text-[#002f34]' : 'rotate-0 text-slate-400 group-hover:text-[#002f34]'"
      fill="none" viewBox="0 0 24 24" stroke="currentColor"
    >
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
    </svg>
  </button>

  <div
    class="grid transition-all duration-300 ease-in-out"
    [ngClass]="isOpen ? 'grid-rows-[1fr] opacity-100' : 'grid-rows-[0fr] opacity-0'"
  >
    <div class="overflow-hidden">
      <div class="px-2 pb-5 pt-1 text-sm text-slate-600 leading-relaxed">
        <ng-content></ng-content>
      </div>
    </div>
  </div>
</div>
