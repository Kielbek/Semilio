<div
  class="fixed inset-0 z-[100] flex items-end sm:items-center justify-center sm:p-4 bg-black/40 backdrop-blur-[2px] transition-all"
  (click)="close.emit()">

  <div
    class="w-full h-full sm:h-auto sm:max-w-md bg-white rounded-none sm:rounded-sm shadow-2xl overflow-hidden animate-in slide-in-from-bottom duration-300 flex flex-col"
    (click)="$event.stopPropagation()">

    <div class="h-[56px] flex items-center justify-between px-5 border-b border-gray-200 bg-white shrink-0">
      <div class="flex items-center gap-3 min-w-0">
        @if (showBackButton) {
          <button (click)="back.emit()" class="-ml-1.5 p-1 hover:bg-gray-50 rounded-full transition-colors text-[#002f34]">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-arrow-left-icon lucide-arrow-left"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg>
          </button>
        }

        <h2 class="text-[19px] font-bold text-[#002f34] tracking-tight leading-none truncate">
          {{ title }}
        </h2>
      </div>

      <button (click)="close.emit()" class="p-1 -mr-1.5 hover:bg-gray-50 rounded-full transition-colors text-[#002f34]">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-x-icon lucide-x"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
      </button>
    </div>

    <div class="flex-1 overflow-y-auto bg-white scrollbar-thin relative min-h-[300px] sm:min-h-[auto]">

      @if (isLoading) {
        <div class="inset-0 z-10 flex items-center justify-center bg-white min-h-[300px]">
          <app-spinner></app-spinner>
        </div>
      } @else {
        <ng-content></ng-content>
      }
    </div>

    <div class="shrink-0">
      <ng-content select="[footer]"></ng-content>
    </div>

  </div>
</div>
